<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Verification - Training Demo</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f6f7fb; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .card { background:#fff; width:360px; padding:24px; border-radius:12px; box-shadow:0 6px 24px rgba(0,0,0,.08); }
    h2 { margin:0 0 8px; }
    .badge { display:inline-block; font-size:12px; padding:4px 8px; border-radius:999px; background:#eef2ff; color:#3730a3; margin-bottom:12px; }
    input { width:100%; padding:10px; margin:8px 0; border:1px solid #d1d5db; border-radius:8px; box-sizing:border-box; }
    button { width:100%; padding:10px; margin-top:10px; border:0; border-radius:8px; background:#2563eb; color:#fff; cursor:pointer; }
    button:hover { background:#1d4ed8; }
    .note { font-size:12px; color:#6b7280; margin-top:10px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">TRAINING DEMO (LOCAL ONLY)</div>
    <h2>Verify Payment Details</h2>
    <p style="margin-top:0;color:#4b5563;font-size:14px;">
      Use <b>test values only</b>. This page posts to <code>http://127.0.0.1:8000/submit</code>.
    </p>

    <form id="payForm">
      <input id="name" placeholder="Cardholder name" required />
      <input id="card" placeholder="Card number (test)" inputmode="numeric" required />
      <input id="exp" placeholder="Expiry (MM/YY)" required />
      <input id="cvv" placeholder="CVV (test)" inputmode="numeric" required />
      <input id="zip" placeholder="ZIP/Postal code" required />
      <button type="submit">Submit</button>
    </form>

    <div class="note">
      Example test card number: <b>4242 4242 4242 4242</b> (do not use real cards).
    </div>
  </div>

  <script>
    document.getElementById("payForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        card: document.getElementById("card").value,
        exp: document.getElementById("exp").value,
        cvv: document.getElementById("cvv").value,
        zip: document.getElementById("zip").value,
      };

      try {
        const res = await fetch("http://127.0.0.1:8000/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        const out = await res.json();
        alert(out.message || "Submitted");
      } catch (err) {
        console.error(err);
        alert("Server not running?");
      }
    });
  </script>
</body>
</html>
